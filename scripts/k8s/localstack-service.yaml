# disk volume claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  labels:
    com.job.service: localstack-claim
  name: localstack-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
status: {}
---
# deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    com.job.service: localstack-deployment
  name: localstack-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      com.job.service: localstack-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        com.job.service: localstack-deployment
    spec:
      containers:
        - name: localstack-main
          image: localstack/localstack:stable
          imagePullPolicy: "IfNotPresent"
          env:            
            - name: AWS_DEFAULT_REGION
              value: 'us-east-1'
            - name: SERVICES
              value: 'sqs,sns,dynamodb'
          ports:
            - containerPort: 4566
            - containerPort: 4567
            - containerPort: 4568
            - containerPort: 4569
            - containerPort: 4570
            - containerPort: 4571
            - containerPort: 4572
            - containerPort: 4573
            - containerPort: 4574
            - containerPort: 4575
            - containerPort: 4576
            - containerPort: 4577
            - containerPort: 4578
            - containerPort: 4579
            - containerPort: 4580
            - containerPort: 4581
            - containerPort: 4582
            - containerPort: 4583
            - containerPort: 4584
            - containerPort: 4585
            - containerPort: 4586
            - containerPort: 4587
            - containerPort: 4588
            - containerPort: 4589
            - containerPort: 4590
            - containerPort: 4591
            - containerPort: 4592
            - containerPort: 4593
            - containerPort: 4594
            - containerPort: 4595
            - containerPort: 4596
            - containerPort: 4597
          livenessProbe:
            httpGet:
              path: /
              port: 4566
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 4566              
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          volumeMounts:
            - name: localstack-storage 
              mountPath: /var/lib/localstack
      restartPolicy: Always
      serviceAccountName: localstack-account
      volumes:
        - name: localstack-storage
          persistentVolumeClaim:
            claimName: localstack-claim
---
# service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: localstack-account
  labels:
    com.job.service: localstack-service-account
---
# service
apiVersion: v1
kind: Service
metadata:
  labels:
    com.job.service: localstack-service
  name: localstack-service
spec:
  type: NodePort
  ports:
    - port: 4566
      name: edge
      targetPort: 4566
      nodePort: 30566
    - port: 4571
      name: es
      targetPort: 4571
      nodePort: 30571
  selector:
    com.job.service: localstack-deployment
status:
  loadBalancer: {}