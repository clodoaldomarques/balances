# disk volume claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  labels:
    com.job.service: localstack-claim
  name: localstack-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
status: {}
---
# deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    com.job.service: localstack-deployment
  name: localstack-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      com.job.service: localstack-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        com.job.service: localstack-deployment
    spec:
      containers:
        - env:
            - name: AWS_DEFAULT_REGION
              value: 'us-east-1'
            - name: SERVICES
              value: 'sqs,sns,dynamodb'
          image: localstack/localstack
          imagePullPolicy: IfNotPresent
          name: localstack-main
          ports:
            - name: edge
              containerPort: 4566
              protocol: TCP
            - name: es
              containerPort: 4571
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/localstack
              name: localstack-claim
      restartPolicy: Always
      serviceAccountName: localstack-account
      volumes:
        - name: localstack-claim
          persistentVolumeClaim:
            claimName: localstack-claim
---
# service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: localstack-account
  labels:
    com.job.service: localstack-service-account
---
# service
apiVersion: v1
kind: Service
metadata:
  labels:
    com.job.service: localstack-service
  name: localstack-service
spec:
  type: NodePort
  ports:
    - port: 4566
      name: edge
      targetPort: 4566
      nodePort: 30456
    - port: 4571
      name: es
      targetPort: 4571
      nodePort: 30457      
  selector:
    com.job.service: localstack-service