# gui
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gui-deployment
  labels:
    com.job.service: dynamo-db
    tier: dynamodb
spec:
  selector: 
    matchLabels:
      com.job.service: dynamo-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels: 
        com.job.service: dynamo-db
        tier: dynamodb
    spec:
      containers:
        - name: dynamo-db
          image: aaronshaf/dynamodb-admin
          imagePullPolicy: "IfNotPresent"
          env:            
            - name: DYNAMO_ENDPOINT
              value: 'localstack-service:4566'
            - name: AWS_REGION
              value: 'us-east-1'
          ports:
            - name: dynamo-gui
              containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: gui-service
  labels:
    com.job.service: gui-service
spec:
  type: NodePort
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
  selector:
    com.job.service: dynamo-db
    tier: dynamodb