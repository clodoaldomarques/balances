apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    com.job.service: mysql-db
    tier: mysql
spec:
  selector: 
    matchLabels:
      com.job.service: mysql-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels: 
        com.job.service: mysql-db
        tier: mysql
    spec:
      containers:
        - name: mysql-db
          image: mysql
          imagePullPolicy: "IfNotPresent"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                 secretKeyRef:
                   name: root-pass
                   key: password
            - name: MYSQL_USER
              value: admin
            - name: MYSQL_PASSWORD
              valueFrom:
                 secretKeyRef:
                   name: balances-pass
                   key: password                   
            - name: MYSQL_DATABASE
              value: balances
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-storage
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:
    com.job.service: mysql-service
spec:
  type: NodePort
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30306
  selector:
    com.job.service: mysql-db
    tier: mysql
  
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: mysql-pv-claim
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi