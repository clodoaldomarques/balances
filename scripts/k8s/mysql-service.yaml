apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
data:
  init-db.sql: |
    -- Criação de duas bases de dados
    CREATE DATABASE IF NOT EXISTS balances;

    -- Criação de um usuário e concessão de privilégios
    GRANT ALL PRIVILEGES ON balances.* TO 'admin'@'%';
    FLUSH PRIVILEGES;

    USE balances;
    
    CREATE IF NOT EXISTS TABLE accounts(
        account_id bigint primary key,
        org_id varchar(100) not null,
        limits json not null,
        balances json not null,
        created_at timestamp default current_timestamp,
        updated_at timestamp default current_timestamp,
        status varchar(100) not null default "active",
        version bigint not null default 1
    );

    CREATE IF NOT EXISTS TABLE entries(
        tracking_id varchar(36) not null primary key,
        account_id bigint not null,
        org_id varchar(100) not null,
        impacts json not null,
        created_at timestamp default current_timestamp
    );

    CREATE IF NOT EXISTS TABLE daily_balances (
        date date not null,
        account_id bigint not null,
        org_id varchar(100) not null,
        balances json not null,
        version bigint not null default 1,
        primary key (date, account_id, org_id)
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    com.job.service: mysql-db
    tier: mysql
spec:
  selector: 
    matchLabels:
      com.job.service: mysql-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels: 
        com.job.service: mysql-db
        tier: mysql
    spec:
      serviceAccountName: default
      containers:
        - name: mysql-db
          image: mysql
          imagePullPolicy: "IfNotPresent"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                 secretKeyRef:
                   name: mysql-balances
                   key: root          
            - name: MYSQL_USER
              value: admin
            - name: MYSQL_PASSWORD
              valueFrom:
                 secretKeyRef:
                   name: mysql-balances
                   key: balances                   
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
        - name: mysql-initdb
          configMap:
            name: mysql-init-script    
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:
    com.job.service: mysql-service
spec:
  type: NodePort
  ports:
    - port: 3306
      targetPort: 3306
      nodePort: 30001
  selector:
    com.job.service: mysql-db
    tier: mysql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: mysql-pv-claim
  labels:
    com.job.service: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi