apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    com.job.service: redis
spec:
  selector:
    matchLabels:
      com.job.service: redis
  replicas: 1
  template:
    metadata:
      labels:
        com.job.service: redis
        role: master
    spec:
      containers:
      - name: master
        image: redis
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    com.job.service: redis-service
    role: master
spec:
  type: NodePort
  ports:
  - port: 6379
    targetPort: 6379
    nodePort: 30379
  selector:
    com.job.service: redis
    role: master
